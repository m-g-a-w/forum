server:
  port: 8081

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/knowledge_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=GMT%2B8
    username: root
    password: 1234
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

jwt:
  secret: aW52YWxpZF9rZXlfdGhhdF9tdXN0X2JlX2F0X2xlYXN0XzI1Nl9iaXRzX2xvbmdfZm9yX2hzMjU2
  expire-time: 86400000 # 24 hours

# 支付宝配置
# 公钥说明（避免 TeaException 验签失败）：
# - private-key：应用私钥（与你在开放平台上传的「应用公钥」成对）
# - alipay-public-key：必须是开放平台「接口加签方式」里展示的「支付宝公钥」，不能填应用公钥，也不能用私钥推导的公钥
# - 新版沙箱网关 openapi-sandbox.dl.alipaydev.com 与沙箱 AppId 必须同一套密钥
# - 可用环境变量覆盖：ALIPAY_APP_ID、ALIPAY_MERCHANT_PRIVATE_KEY、ALIPAY_ALIPAY_PUBLIC_KEY
# - 若暂时不配好公钥，可将 precreate-enabled 设为 false，充值会走前端「模拟支付」逻辑，不调用预下单接口
alipay:
  app-id: ${ALIPAY_APP_ID:9021000163602080}
  private-key: ${ALIPAY_MERCHANT_PRIVATE_KEY:}
  # 支付宝公钥（开放平台「接口加签方式」展示）；可用 ALIPAY_ALIPAY_PUBLIC_KEY 覆盖
  alipay-public-key: ${ALIPAY_ALIPAY_PUBLIC_KEY:}
  notify-url: http://localhost:8081/user/alipay/notify
  sandbox: true
  precreate-enabled: ${ALIPAY_PRECREATE_ENABLED:false}
